name: Regenerate package lock

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate-lockfile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: fix/regenerate-package-lock

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Regenerate package-lock.json
        run: npm install --package-lock-only --no-audit --no-fund

      - name: Install dependencies from regenerated lockfile
        run: npm ci --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Commit regenerated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package-lock.json
          if git diff --cached --quiet; then
            echo "No lockfile changes to commit."
          else
            git commit -m "Regenerate package lock"
            git push origin fix/regenerate-package-lock
          fi
